<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>R Path AI — Regulatory Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--radius:11px;--radius-sm:8px;--font:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;}
[data-theme="light"]{
  --bg:#f6f7f9;--surface:#fff;--surface-2:#fbfcfd;--text:#0f172a;--text-2:#475569;--muted:#94a3b8;--faint:#cbd5e1;
  --border:#e7eaf0;--border-2:#eef1f5;--navy:#0f172a;--blue:#2563eb;--blue-soft:#eff4ff;
  --emerald:#059669;--emerald-soft:#ecfdf5;--amber:#d97706;--amber-soft:#fffbeb;--red:#dc2626;--red-soft:#fef2f2;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 14px rgba(16,24,40,.05);--shadow-lg:0 12px 36px rgba(16,24,40,.12);
  --sidebar:#0f172a;--sidebar-text:#cbd5e1;--sidebar-active:#1e293b;--sidebar-accent:#3b82f6;}
[data-theme="dark"]{
  --bg:#0a0e17;--surface:#111726;--surface-2:#0f1521;--text:#e6ebf5;--text-2:#9aa6be;--muted:#6b7689;--faint:#3a455c;
  --border:#212a3d;--border-2:#1a2233;--navy:#e6ebf5;--blue:#3b82f6;--blue-soft:#15233f;
  --emerald:#34d399;--emerald-soft:#10241d;--amber:#fbbf24;--amber-soft:#2a2113;--red:#f87171;--red-soft:#2a1518;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);--shadow-lg:0 16px 48px rgba(0,0,0,.5);
  --sidebar:#0b101b;--sidebar-text:#9aa6be;--sidebar-active:#182133;--sidebar-accent:#3b82f6;}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer}a{color:inherit;text-decoration:none}

.sidebar{width:248px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sidebar.collapsed{width:72px}
.side-top{padding:18px 18px 10px;display:flex;align-items:center;gap:11px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:grid;place-items:center;flex-shrink:0;font-weight:700;color:#fff;font-size:15px;box-shadow:0 4px 12px rgba(59,130,246,.4)}
.logo-text{font-weight:600;color:#fff;font-size:15px;white-space:nowrap}.logo-text small{display:block;font-size:10.5px;color:#64748b;font-weight:500;letter-spacing:.4px}
.sidebar.collapsed .logo-text,.sidebar.collapsed .nav-label,.sidebar.collapsed .side-section,.sidebar.collapsed .uinfo{display:none}
.nav{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:2px}
.side-section{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:#475569;font-weight:600;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--sidebar-text);font-weight:500;font-size:13.5px;transition:.13s;white-space:nowrap}
.nav-item svg{width:18px;height:18px;flex-shrink:0}.nav-item:hover,.nav-item.active{background:var(--sidebar-active);color:#fff}
.nav-item.active svg{color:var(--sidebar-accent)}
.uprofile{padding:12px;margin:10px;border-top:1px solid #1e293b;display:flex;align-items:center;gap:11px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#34d399,#059669);display:grid;place-items:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0}
.uinfo .un{font-size:13px;color:#e2e8f0;font-weight:600;white-space:nowrap}.uinfo .ur{font-size:11px;color:#64748b;white-space:nowrap}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:14px;padding:0 22px}
.collapse-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--text-2)}.collapse-btn:hover{background:var(--bg)}
.topbar .tt{font-weight:600;font-size:14px}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.live{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);border:1px solid var(--border);border-radius:999px;padding:5px 11px;font-weight:500}
.live .ld{width:7px;height:7px;border-radius:50%;background:var(--muted)}.live.on .ld{background:var(--emerald);box-shadow:0 0 0 3px var(--emerald-soft)}
.icon-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--text-2)}.icon-btn:hover{background:var(--bg)}.icon-btn svg{width:18px;height:18px}

.page{flex:1;overflow-y:auto;padding:28px 32px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px}
.page-head h1{font-size:24px;font-weight:700;margin:0;letter-spacing:-.4px}
.page-head .sub{color:var(--text-2);font-size:13.5px;margin-top:4px}
.crumbs{font-size:12.5px;color:var(--muted);margin-bottom:6px}.crumbs b{color:var(--text-2);font-weight:500}

.btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:13px;transition:.13s}.btn:hover{background:var(--bg)}.btn svg{width:16px;height:16px}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.primary:hover{filter:brightness(1.07)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap}
.pill .pdot{width:6px;height:6px;border-radius:50%}
.pill.green{background:var(--emerald-soft);color:var(--emerald)}.pill.green .pdot{background:var(--emerald)}
.pill.blue{background:var(--blue-soft);color:var(--blue)}.pill.blue .pdot{background:var(--blue)}
.pill.gray{background:var(--bg);color:var(--text-2);border:1px solid var(--border)}.pill.gray .pdot{background:var(--muted)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-h{padding:16px 20px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between}
.card-h h3{margin:0;font-size:15px;font-weight:600}.card-h .cap{font-size:11.5px;color:var(--muted)}
.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(4,1fr)}.cols-2{grid-template-columns:1fr 1fr}
.kpi{padding:18px 20px}.kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kpi .kicon{width:38px;height:38px;border-radius:10px;display:grid;place-items:center}.kpi .kicon svg{width:19px;height:19px}
.kpi .label{color:var(--text-2);font-size:12.5px;font-weight:500}.kpi .val{font-size:27px;font-weight:700;letter-spacing:-.5px;margin-top:3px}
.kpi .meta{font-size:11.5px;color:var(--muted);margin-top:6px}

.bars{padding:16px 20px;display:flex;flex-direction:column;gap:13px}
.bar .bl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}.bar .bl .nm{font-weight:500;display:flex;align-items:center;gap:8px}
.bar .bl .ct{font-family:var(--mono);color:var(--text-2)}
.bar .track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden}.bar .fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.evalgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.evalc{padding:18px 20px;border-right:1px solid var(--border-2)}.evalc:last-child{border-right:none}
.evalc .el{font-size:12px;color:var(--text-2);font-weight:500}.evalc .ev{font-size:28px;font-weight:700;letter-spacing:-.5px;margin:4px 0 2px}
.evalc .ed{font-size:11.5px;color:var(--muted)}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600;padding:11px 20px;border-bottom:1px solid var(--border-2);background:var(--surface-2)}
td{padding:12px 20px;border-bottom:1px solid var(--border-2);font-size:13.5px;color:var(--text-2)}tr:last-child td{border-bottom:none}
tbody tr{transition:.1s}tbody tr:hover{background:var(--surface-2)}
td .pname{color:var(--text);font-weight:600}.cellrow{display:flex;align-items:center;gap:10px}
.miniav{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0}
.mono{font-family:var(--mono);font-size:12.5px}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filt{height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;font-family:inherit}
.searchbox{position:relative;flex:1;max-width:300px;margin-left:auto}
.searchbox input{width:100%;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);padding:0 12px 0 34px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.searchbox input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.searchbox svg{position:absolute;left:11px;top:9px;width:17px;height:17px;color:var(--muted)}

.cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.agency{padding:20px}.agency .flag{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-weight:700;color:#fff;font-size:14px;margin-bottom:14px}
.agency .an{font-weight:600;font-size:15px}.agency .ad{font-size:12.5px;color:var(--muted);margin-top:2px}
.agency .arow{display:flex;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--border-2)}
.agency .arow .n{font-weight:700;font-size:17px}.agency .arow .l{color:var(--muted);font-size:11px}

.amon{padding:18px 20px}.amon .ah{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.amon .aic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center}.amon .aic svg{width:19px;height:19px}
.amon .adesc{font-size:13px;color:var(--text-2);line-height:1.55}
.toollist{display:flex;flex-direction:column;gap:2px}
.tool{display:flex;gap:13px;padding:14px 20px;border-bottom:1px solid var(--border-2)}.tool:last-child{border-bottom:none}
.tool .tic{width:34px;height:34px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;flex-shrink:0}.tool .tic svg{width:16px;height:16px}
.tool .tn{font-weight:600;font-size:13.5px;font-family:var(--mono)}.tool .td2{font-size:12.5px;color:var(--muted);margin-top:2px}

.consult-hero{max-width:760px;margin:4vh auto 0;text-align:center}
.consult-hero h1{font-size:30px;font-weight:700;letter-spacing:-.6px;margin:0 0 8px}
.consult-hero p{color:var(--text-2);font-size:15px;margin:0 0 30px}
.promptbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);padding:8px 8px 8px 18px;display:flex;gap:10px;text-align:left}
.promptbox:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft),var(--shadow-lg)}
.promptbox textarea{flex:1;border:none;background:transparent;resize:none;color:var(--text);font-family:inherit;font-size:15px;line-height:1.5;padding:11px 0;max-height:200px;outline:none}
.promptbox .send{align-self:flex-end;width:42px;height:42px;border-radius:10px;background:var(--blue);color:#fff;border:none;display:grid;place-items:center;font-size:18px}.promptbox .send:disabled{opacity:.4}
.suggest{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
.suggest .s{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;transition:.14s;box-shadow:var(--shadow)}
.suggest .s:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.suggest .s .st{font-weight:600;font-size:13.5px}.suggest .s .sd{font-size:12.5px;color:var(--muted);margin-top:4px}
.workflow{max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.wf-q{background:#1e293b;color:#e6ebf5;align-self:flex-end;max-width:75%;padding:13px 17px;border-radius:13px 13px 4px 13px;font-size:14.5px;line-height:1.5}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.agent-h{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer}
.agent-h .ai{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}.agent-h .ai svg{width:16px;height:16px}
.agent-h .nm{font-weight:600;font-size:14px}.agent-h .role{font-size:12px;color:var(--muted)}
.agent-meta{margin-left:auto;display:flex;gap:8px;align-items:center}.chev{color:var(--muted);transition:.2s}.agent-card.open .chev{transform:rotate(180deg)}
.agent-body{max-height:0;overflow:hidden;transition:max-height .3s ease}.agent-card.open .agent-body{max-height:1600px}
.agent-body-in{padding:2px 20px 18px;border-top:1px solid var(--border-2)}
.agent-body-in p,.agent-body-in li{font-size:13.8px;line-height:1.62;color:var(--text-2)}.agent-body-in strong{color:var(--text)}
.agent-body-in code{font-family:var(--mono);font-size:12px;background:var(--bg);padding:1px 5px;border-radius:5px}
.metricbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.chip{font-size:11.5px;font-family:var(--mono);color:var(--text-2);background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:4px 11px}.chip b{color:var(--text)}
.steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.step{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.step .sc{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:grid;place-items:center;font-size:11px}
.step.active{color:var(--blue)}.step.active .sc{border-color:var(--blue);background:var(--blue-soft)}
.step-arrow{color:var(--faint)}
.spinner{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}

.skel{background:linear-gradient(90deg,var(--border-2) 25%,var(--bg) 50%,var(--border-2) 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:6px}@keyframes sh{to{background-position:-200% 0}}
.hide{display:none!important}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.cols-2{grid-template-columns:1fr}.cardgrid{grid-template-columns:repeat(2,1fr)}.suggest{grid-template-columns:1fr}.evalgrid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.authgate{position:fixed;inset:0;z-index:200;background:var(--bg);display:grid;place-items:center}
.authcard{width:380px;max-width:90vw;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);padding:30px 30px 26px}
.authcard .lg{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:grid;place-items:center;color:#fff;font-weight:700;font-size:20px;margin:0 auto 16px}
.authcard h2{text-align:center;margin:0 0 4px;font-size:19px}
.authcard .as{text-align:center;color:var(--text-2);font-size:13px;margin-bottom:20px}
.authcard label{font-size:12px;font-weight:600;color:var(--text-2);display:block;margin:12px 0 6px}
.authcard input{width:100%;height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);padding:0 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.authcard input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.authcard .ab{width:100%;height:42px;margin-top:20px;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.authcard .ab:disabled{opacity:.6}
.authcard .alt{text-align:center;margin-top:14px;font-size:13px;color:var(--text-2)}.authcard .alt a{color:var(--blue);font-weight:600;cursor:pointer}
.autherr{color:var(--red);font-size:12.5px;text-align:center;margin-top:10px;min-height:15px}
.empty-page{text-align:center;color:var(--muted);padding:70px 20px}.empty-page h3{color:var(--text);font-size:18px;margin:0 0 6px}
.modal-ov{position:fixed;inset:0;z-index:150;background:rgba(15,23,42,.55);display:grid;place-items:center;padding:20px}
.modal{width:480px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-2)}.modal-h h3{margin:0;font-size:16px}
.xbtn{background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer}
.modal-b{padding:18px 22px}.modal-b label{font-size:12px;font-weight:600;color:var(--text-2);display:block;margin:12px 0 6px}.modal-b label:first-child{margin-top:0}
.modal-b input{width:100%;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);padding:0 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.modal-b input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-f{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border-2)}
</style>
</head>
<body>

<div class="authgate" id="authGate">
  <div class="authcard">
    <div class="lg">R</div>
    <h2 id="authTitle">Sign in to R Path AI</h2>
    <div class="as">Regulatory intelligence workspace</div>
    <label>Email</label><input id="authEmail" type="email" autocomplete="email" placeholder="you@firm.com"/>
    <label>Password</label><input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••"/>
    <button class="ab" id="authBtn">Sign in</button>
    <div class="autherr" id="authErr"></div>
    <div class="alt" id="authAlt">No account? <a id="authToggle">Create one</a></div>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="side-top"><div class="logo">R</div><div class="logo-text">R Path AI<small>Regulatory Intelligence</small></div></div>
  <nav class="nav" id="nav"></nav>
  <div class="uprofile"><div class="avatar" id="uAvatar">U</div><div class="uinfo" style="flex:1;min-width:0"><div class="un" id="uName">—</div><div class="ur" id="uEmail" style="overflow:hidden;text-overflow:ellipsis"></div></div><button id="signout" title="Sign out" style="background:transparent;border:1px solid #1e293b;color:#64748b;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button></div>
</aside>

<div class="main">
  <header class="topbar">
    <button class="collapse-btn" id="collapse" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="tt" id="topTitle">Dashboard</div>
    <div class="top-actions">
      <div class="live" id="liveBadge"><span class="ld"></span> <span id="liveText">connecting…</span></div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme"></button>
    </div>
  </header>
  <div class="page" id="page"></div>
</div>

<script>

let currentRoute='dashboard';
function render(){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.route===currentRoute||(currentRoute==='workspace'&&n.dataset.route==='projects')));
  if(currentRoute!=='workspace')document.getElementById('topTitle').textContent=(NAV.find(n=>n.id===currentRoute)||{}).label||'';
  if(currentRoute==='workspace'){document.getElementById('page').innerHTML=pageWorkspace();loadWorkspace();return;}
  document.getElementById('page').innerHTML=(PAGES[currentRoute]||pageDashboard)();
  if(currentRoute==='consult')wireConsult();

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- consultation (live backend) ---------- */
const AGENT_STYLE={Regulatory:{i:'shield',c:'#7c3aed',role:'Pathways · statutes · compliance'},Quality:{i:'check',c:'#0891b2',role:'CAPA · deviations · data integrity'},Manufacturing:{i:'beaker',c:'#059669',role:'CGMP · validation · sterility'}};
let cHistory=[];
function wireConsult(){
  const input=document.getElementById('cInput'),send=document.getElementById('cSend');if(!input)return;
  const grow=()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,200)+'px'};
  input.addEventListener('input',grow);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}});
  send.onclick=go;document.querySelectorAll('.suggest .s').forEach(b=>b.onclick=()=>{input.value=b.dataset.q;go()});
  function go(){const q=input.value.trim();if(q)runConsult(q)}
}
async function runConsult(q){
  const r=document.getElementById('consultRoot');const hero=r.querySelector('.consult-hero');if(hero)hero.remove();
  let wf=document.getElementById('wf');if(!wf){wf=document.createElement('div');wf.className='workflow';wf.id='wf';r.appendChild(wf)}
  wf.insertAdjacentHTML('beforeend',`<div class="wf-q">${esc(q)}</div>`);
  const sid='st'+Date.now();wf.insertAdjacentHTML('beforeend',stepsHtml(sid));scrollPage();
  try{
    const data=await (await api('/ask',{method:'POST',body:JSON.stringify({question:q,history:cHistory})})).json();
    document.getElementById(sid).remove();renderAgents(wf,data.answer||'');renderReport(wf,data);
    cHistory.push({role:'user',content:q});cHistory.push({role:'assistant',content:data.answer||''});cHistory=cHistory.slice(-6);
  }catch(e){const s=document.getElementById(sid);if(s)s.innerHTML='<div class="step" style="color:var(--red)">Error contacting the server.</div>'}
  scrollPage();
}
function stepsHtml(id){const names=['Coordinator','Regulatory','Quality','Manufacturing','Synthesis'];
  return `<div class="steps" id="${id}">${names.map((n,i)=>`${i?'<span class="step-arrow">→</span>':''}<div class="step ${i===0?'active':''}"><span class="sc">${i===0?'<span class="spinner"></span>':i+1}</span>${n}</div>`).join('')}</div>`}
function renderAgents(wf,answer){
  answer.split(/^###\s+/m).filter(Boolean).forEach((sec,idx)=>{
    const nl=sec.indexOf('\n');const title=sec.slice(0,nl).replace(/Agent/i,'').trim();const body=sec.slice(nl+1).trim();
    const st=AGENT_STYLE[title]||{i:'consult',c:'#2563eb',role:'Specialist analysis'};
    const card=document.createElement('div');card.className='agent-card '+(idx===0?'open':'');
    card.innerHTML=`<div class="agent-h"><div class="ai" style="background:${st.c}1a;color:${st.c}">${icon(st.i)}</div>
      <div><div class="nm">${title} Agent</div><div class="role">${st.role}</div></div>
      <div class="agent-meta"><span class="pill green"><span class="pdot"></span>Complete</span>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6" stroke-width="2"/></svg></div></div>
      <div class="agent-body"><div class="agent-body-in">${marked.parse(body)}</div></div>`;
    card.querySelector('.agent-h').onclick=()=>card.classList.toggle('open');wf.appendChild(card);
  });
}
function renderReport(wf,data){const m=data.metrics||{};const el=document.createElement('div');
  el.innerHTML=`<div class="metricbar" style="margin:14px 0 4px">
    <span class="chip"><b>${m.agents??'?'}</b> agents</span><span class="chip"><b>${(m.latency??0).toFixed(1)}s</b></span>
    <span class="chip">$<b>${(m.cost??0).toFixed(4)}</b></span>
    <span class="chip"><b>${((m.prompt_tokens||0)+(m.completion_tokens||0)).toLocaleString()}</b> tokens</span>
    <span class="pill green" style="margin-left:auto"><span class="pdot"></span>Grounded · cited</span></div>`;wf.appendChild(el)}
function scrollPage(){const p=document.getElementById('page');p.scrollTop=p.scrollHeight}

  g.innerHTML=PROJECTS.map(p=>`<div class="card agency" style="cursor:pointer" onclick="openWorkspace(${p.id})">
    <div class="flag" style="background:${hashColor(p.name)}">${(p.name[0]||'P').toUpperCase()}</div>
    <div class="an">${esc(p.name)}</div><div class="ad">${esc(p.client||'No client')}${p.region?' · '+esc(p.region):''}</div>
    <div class="arow"><div><div class="n">${p.consultations||0}</div><div class="l">CONSULTATIONS</div></div>
      <div style="text-align:right"><div class="l">${new Date(p.created_at).toLocaleDateString()}</div></div></div></div>`).join('');
}
function openProjectModal(){
  const m=document.createElement('div');m.className='modal-ov';m.id='projModal';
  m.innerHTML=`<div class="modal"><div class="modal-h"><h3>New Project</h3><button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <label>Project name *</label><input id="pName" placeholder="e.g. Zentara BLA Submission"/>
      <label>Client</label><input id="pClient" placeholder="e.g. Zentara Biologics"/>
      <div class="frow"><div><label>Region</label><input id="pRegion" placeholder="US / EU / UK"/></div>
        <div><label>Drug type</label><input id="pDrug" placeholder="Biologic, small molecule…"/></div></div>
      <div class="frow"><div><label>Submission type</label><input id="pSub" placeholder="BLA, NDA, MAA…"/></div>
        <div><label>Agencies</label><input id="pAg" placeholder="FDA, EMA"/></div></div>
      <div class="autherr" id="pErr"></div></div>
    <div class="modal-f"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" id="pCreate">Create Project</button></div></div>`;
  document.body.appendChild(m);document.getElementById('pCreate').onclick=createProject;document.getElementById('pName').focus();
}
function closeModal(){const m=document.getElementById('projModal');if(m)m.remove()}
async function createProject(){
  const name=gv('pName');if(!name){document.getElementById('pErr').textContent='Project name is required.';return}
  const body={name,client:gv('pClient'),region:gv('pRegion'),drug_type:gv('pDrug'),submission_type:gv('pSub'),agencies:gv('pAg')};
  const btn=document.getElementById('pCreate');btn.disabled=true;
  const res=await api('/projects',{method:'POST',body:JSON.stringify(body)});btn.disabled=false;
  if(!res.ok){document.getElementById('pErr').textContent='Could not create project.';return}
  closeModal();loadProjects();
}
function openWorkspace(id){currentProjectId=id;currentRoute='workspace';render();document.getElementById('page').scrollTop=0;}
function pageWorkspace(){return `<div id="wsRoot"><div class="card skel" style="height:90px;margin-bottom:18px"></div><div class="card skel" style="height:220px"></div></div>`;}
async function loadWorkspace(){
  let proj,cons;
  try{proj=await (await api('/projects/'+currentProjectId)).json();
      cons=(await (await api('/consultations?project_id='+currentProjectId)).json()).consultations;}
  catch(e){const r=document.getElementById('wsRoot');if(r)r.innerHTML='<div class="empty-page"><h3>Could not load project</h3></div>';return}
  currentProjectObj=proj;document.getElementById('topTitle').textContent=proj.name;
  const meta=[['Client',proj.client],['Region',proj.region],['Drug Type',proj.drug_type],['Submission',proj.submission_type],['Agencies',proj.agencies]].filter(m=>m[1]);
  const root=document.getElementById('wsRoot');if(!root)return;
  root.innerHTML=`
    <div class="crumbs"><b>Home</b> / <a onclick="currentRoute='projects';render()" style="cursor:pointer;color:var(--blue)">Projects</a> / ${esc(proj.name)}</div>
    <div class="page-head"><div><h1>${esc(proj.name)}</h1><div class="sub">${proj.client?esc(proj.client):'No client'}</div></div>
      <button class="btn" onclick="deleteProject(${proj.id})">${icon('trash')} Delete</button></div>
    ${meta.length?`<div class="card" style="margin-bottom:18px"><div style="display:flex;flex-wrap:wrap;gap:26px;padding:16px 20px">
      ${meta.map(m=>`<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${m[0]}</div><div style="font-weight:600;margin-top:3px">${esc(m[1])}</div></div>`).join('')}</div></div>`:''}
    <div class="promptbox" style="margin-bottom:20px"><textarea id="wsInput" rows="1" placeholder="Ask a question for this project…"></textarea><button class="send" id="wsSend">↑</button></div>
    <div class="workflow" id="wsWf"></div>`;
  const wf=document.getElementById('wsWf');
  cons.slice().reverse().forEach(c=>renderSaved(wf,c));
  const input=document.getElementById('wsInput'),send=document.getElementById('wsSend');
  const grow=()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,200)+'px'};
  input.addEventListener('input',grow);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();wsGo()}});
  const wsGo=()=>{const q=input.value.trim();if(q){input.value='';grow();askInProject(q)}};
  send.onclick=wsGo;scrollPage();
}
function renderSaved(wf,c){wf.insertAdjacentHTML('beforeend',`<div class="wf-q">${esc(c.question)}</div>`);renderAgents(wf,c.answer||'');if(c.metrics)renderReport(wf,{metrics:c.metrics});}
async function askInProject(q){
  const wf=document.getElementById('wsWf');wf.insertAdjacentHTML('beforeend',`<div class="wf-q">${esc(q)}</div>`);
  const sid='st'+Date.now();wf.insertAdjacentHTML('beforeend',stepsHtml(sid));scrollPage();
  try{const data=await (await api('/ask',{method:'POST',body:JSON.stringify({question:q,history:[],project_id:currentProjectId})})).json();
    document.getElementById(sid).remove();renderAgents(wf,data.answer||'');renderReport(wf,data);}
  catch(e){const s=document.getElementById(sid);if(s)s.innerHTML='<div class="step" style="color:var(--red)">Error contacting the server.</div>'}
  scrollPage();
}
async function deleteProject(id){if(!confirm('Delete this project and all its consultations?'))return;await api('/projects/'+id,{method:'DELETE'});currentRoute='projects';render();}

let supa=null,authToken=null,authMode='login';
async function api(path,opts={}){opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});if(authToken)opts.headers['Authorization']='Bearer '+authToken;return fetch(path,opts);}
function showAuth(){document.getElementById('authGate').classList.remove('hide')}
function onLogin(session){
  authToken=session.access_token;const email=(session.user&&session.user.email)||'';
  document.getElementById('uEmail').textContent=email;
  document.getElementById('uName').textContent=email.split('@')[0]||'Account';
  document.getElementById('uAvatar').textContent=(email[0]||'U').toUpperCase();
  document.getElementById('authGate').classList.add('hide');
  render();loadData();
}
function toggleMode(){authMode=authMode==='login'?'signup':'login';const lg=authMode==='login';
  document.getElementById('authTitle').textContent=lg?'Sign in to R Path AI':'Create your account';
  document.getElementById('authBtn').textContent=lg?'Sign in':'Create account';
  document.getElementById('authAlt').innerHTML=lg?'No account? <a id="authToggle">Create one</a>':'Have an account? <a id="authToggle">Sign in</a>';
  document.getElementById('authToggle').onclick=toggleMode;}
async function doAuth(){
  const email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPass').value;
  const err=document.getElementById('authErr');err.textContent='';
  if(!email||!pass){err.textContent='Enter your email and password.';return}
  const btn=document.getElementById('authBtn');btn.disabled=true;
  const res=authMode==='login'?await supa.auth.signInWithPassword({email,password:pass}):await supa.auth.signUp({email,password:pass});
  btn.disabled=false;
  if(res.error){err.textContent=res.error.message;return}
  if(res.data.session)onLogin(res.data.session);else err.textContent='Account created — check your email to confirm, then sign in.';
}
async function boot(){
  let cfg;try{cfg=await (await fetch('/config')).json()}catch(e){document.getElementById('authErr').textContent='Cannot reach server.';showAuth();return}
  supa=window.supabase.createClient(cfg.supabase_url,cfg.supabase_anon_key);
  document.getElementById('authBtn').onclick=doAuth;
  document.getElementById('authToggle').onclick=toggleMode;
  document.getElementById('signout').onclick=async()=>{await supa.auth.signOut();location.reload()};
  document.getElementById('authPass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
  const {data:{session}}=await supa.auth.getSession();
  if(session)onLogin(session);else showAuth();
}
boot();
</script>
